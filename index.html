<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peluquería Rossi — Gestión</title>
  <meta name="description" content="Peluquería Rossi — gestión de citas, clientes, productos y estadísticas." />
  <meta name="theme-color" content="#ffffff" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='78' font-size='80'%3E%E2%9C%82%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=13" />
  <script defer src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <!-- ===== LOGIN ===== -->
  <section id="login-view" class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <span class="brand-emoji">✂️</span>
        <h1>Peluquería <span class="accent">Rossi</span></h1>
        <p class="tagline">Gestión del salón</p>
      </div>
      <form id="login-form" autocomplete="off">
        <label>Usuario <input type="text" id="login-user" placeholder="usuario" required /></label>
        <label>Contraseña <input type="password" id="login-pass" placeholder="••••••••" required /></label>
        <p id="login-error" class="login-error" hidden>Usuario o contraseña incorrectos.</p>
        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>
    </div>
  </section>

  <!-- ===== APP ===== -->
  <div id="app-view" hidden>
    <header class="topbar">
      <div class="topbar-brand">
        <span class="brand-emoji">✂️</span>
        <strong>Peluquería <span class="accent">Rossi</span></strong>
      </div>
      <nav class="tabs" id="nav">
        <a class="tab" href="#/agenda">Agenda</a>
        <a class="tab" href="#/clientes">Clientes</a>
        <a class="tab" href="#/productos">Servicios</a>
        <a class="tab" href="#/stock">Stock</a>
        <a class="tab" href="#/ventas">Ventas</a>
        <a class="tab" href="#/stats">Estadísticas</a>
        <a class="tab" href="#/facturacion">Facturación</a>
      </nav>
      <div class="topbar-actions">
        <button id="theme-toggle" class="icon-btn" title="Cambiar tema">🌙</button>
        <button id="logout" class="btn btn-ghost btn-sm">Salir</button>
      </div>
    </header>
    <main class="container" id="view-root"></main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script type="module" src="js/app.js?v=13"></script>
</body>
</html>
